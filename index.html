<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>設定判別カウンターD</title>
    <style>
        body { background-color: #121212; color: #ffffff; font-family: 'Helvetica Neue', Arial, sans-serif; margin: 0; padding: 10px; padding-bottom: 30px; user-select: none; -webkit-user-select: none; }
        button { white-space: nowrap; cursor: pointer; }
        .container { max-width: 500px; margin: 0 auto; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        h1 { font-size: 1.1rem; margin: 0; color: #e0e0e0; }
        .header-btns { display: flex; gap: 8px; }
        .btn-top { background-color: #333; color: #fff; border: 1px solid #555; padding: 6px 10px; border-radius: 4px; font-size: 0.8rem; }
        .btn-manual { color: #00ffcc; border-color: #00ffcc; }
        .btn-add-role { color: #ffcc00; border-color: #ffcc00; }

        .storage-section { background-color: #1a2332; padding: 12px; border-radius: 8px; margin-bottom: 15px; border: 1px solid #2b3d52; }
        .save-row { display: flex; gap: 8px; margin-bottom: 10px; }
        .model-name-input { flex-grow: 1; background-color: #000; border: 1px solid #444; color: #fff; padding: 6px 10px; border-radius: 4px; font-size: 0.9rem; }
        .btn-save { background-color: #00aa66; color: white; border: none; padding: 6px 12px; border-radius: 4px; font-weight: bold; font-size: 0.85rem; }
        .model-list { display: flex; flex-wrap: wrap; gap: 6px; }
        .model-chip { background-color: #253346; color: #fff; border: 1px solid #3d526b; padding: 4px 8px; border-radius: 15px; font-size: 0.8rem; display: flex; align-items: center; gap: 6px; cursor: pointer; }
        .btn-delete-chip { background: none; border: none; color: #ff4444; font-weight: bold; padding: 0 2px; cursor: pointer; font-size: 0.85rem; }

        .game-section { background-color: #1e1e1e; padding: 12px; border-radius: 8px; margin-bottom: 15px; border: 1px solid #2d2d2d; }
        .game-row { display: flex; align-items: center; margin-bottom: 10px; }
        .game-label { width: 90px; font-size: 0.85rem; color: #aaa; }
        .game-input-wrap { display: flex; flex-grow: 1; gap: 5px; }
        .game-input { width: 70px; background-color: #000; border: 1px solid #444; color: #fff; font-size: 1.1rem; padding: 6px; border-radius: 4px; text-align: center; }
        .btn-add { flex-grow: 1; background-color: #2a2a2a; border: 1px solid #444; color: #fff; padding: 6px 0; border-radius: 4px; font-size: 0.85rem; font-weight: bold; }
        .actual-games-display { background-color: #252525; padding: 8px; border-radius: 6px; text-align: center; font-size: 1rem; font-weight: bold; color: #ffcc00; margin-top: 5px; }

        .counter-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; margin-bottom: 20px; }
        .counter-card { border-radius: 12px; padding: 10px; display: flex; flex-direction: column; align-items: center; border: 2px solid rgba(255,255,255,0.1); }
        .card-top { display: flex; width: 100%; justify-content: flex-end; align-items: center; gap: 4px; margin-bottom: 8px; }
        .role-name-input { flex-grow: 1; width: 40%; background: rgba(0, 0, 0, 0.4); border: none; border-bottom: 1px solid rgba(255,255,255,0.6); color: inherit; text-align: center; font-size: 0.85rem; font-weight: bold; padding: 2px 0; border-radius: 2px; }
        .dark-text .role-name-input { border-bottom: 1px solid rgba(0,0,0,0.6); color: #000; }
        .color-select { background: rgba(0,0,0,0.6); color: #fff; border: none; font-size: 0.7rem; padding: 2px; border-radius: 4px; }
        .count-num { font-size: 2.2rem; font-weight: bold; margin: 2px 0; font-family: monospace; }
        .prob-display { font-size: 0.85rem; font-weight: bold; background: rgba(0,0,0,0.2); padding: 2px 6px; border-radius: 10px; }
        .card-bottom-btns { display: flex; width: 100%; gap: 4px; margin-top: 8px; }
        .btn-card-action { flex: 1; background: rgba(0, 0, 0, 0.5); color: #fff; border: 1px solid rgba(255,255,255,0.3); padding: 8px 0; border-radius: 6px; font-size: 0.8rem; font-weight: bold; }
        .btn-card-reset { flex: 0.8; background: rgba(255, 255, 255, 0.2); color: #fff; border: 1px solid rgba(255,255,255,0.3); padding: 8px 0; border-radius: 6px; font-size: 0.8rem; }
        .btn-delete { flex: 0.8; background: rgba(200, 0, 0, 0.6) !important; }

        .bg-red { background: linear-gradient(135deg, #8b0000, #cc1111); color: #fff; }
        .bg-green { background: linear-gradient(135deg, #006400, #11aa11); color: #fff; }
        .bg-yellow { background: linear-gradient(135deg, #8b8b00, #dddd22); color: #000; }
        .bg-purple { background: linear-gradient(135deg, #4b0082, #8a2be2); color: #fff; }
        .bg-blue { background: linear-gradient(135deg, #004b87, #0088ff); color: #fff; }
        .dark-text { color: #000000 !important; }

        .cz-section { background-color: #1e1e1e; padding: 12px; border-radius: 8px; margin-bottom: 15px; border: 1px solid #ffcc00; }
        .cz-grid { display: flex; justify-content: center; align-items: center; gap: 40px; margin-top: 8px; }
        .cz-col { display: flex; flex-direction: column; align-items: center; }
        .cz-count-box { font-size: 2rem; font-weight: bold; margin: 5px 0; font-family: monospace; }
        .btn-cz-ctrl { width: 50px; background-color: #2a2a2a; border: 1px solid #444; color: #fff; padding: 8px 0; border-radius: 4px; font-weight: bold; }
        .cz-rate-banner { background-color: #252525; padding: 8px; border-radius: 6px; text-align: center; font-size: 1rem; font-weight: bold; color: #00ffcc; margin-top: 10px; }

        .estimation-section { background-color: #1e1e1e; padding: 12px; border-radius: 8px; border: 1px solid #2d2d2d; margin-bottom: 20px; }
        table { width: 100%; border-collapse: collapse; font-size: 0.75rem; text-align: center; }
        th, td { border: 1px solid #333; padding: 4px; }
        .table-input { width: 40px; background-color: #000; border: 1px solid #555; color: #fff; text-align: center; }
        .graph-bar-wrap { flex-grow: 1; background-color: #222; height: 16px; border-radius: 3px; margin: 0 8px; }
        .graph-bar { background: linear-gradient(90deg, #1199ff, #00ffcc); height: 100%; width: 0%; }
        
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-color: rgba(0,0,0,0.85); z-index: 1000; justify-content: center; align-items: center; padding: 15px; }
        .modal-content { background-color: #1e1e1e; border: 2px solid #00ffcc; border-radius: 12px; width: 100%; max-width: 400px; padding: 20px; }
        .btn-close { width: 100%; background-color: #333; color: #fff; padding: 10px; border-radius: 6px; margin-top: 15px; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>設定判別カウンターD</h1>
        <div class="header-btns">
            <button class="btn-top" onclick="fullResetAll()" style="color:#ff4444; border-color:#ff4444;">全リセット</button>
            <button class="btn-top btn-manual" onclick="toggleModal(true)">使い方</button>
            <button class="btn-top btn-add-role" onclick="addNewRole()">役を追加</button>
        </div>
    </div>

    <div class="storage-section">
        <div class="save-row">
            <input type="text" id="modelNameInput" class="model-name-input" placeholder="機種名・データを入力">
            <button class="btn-save" onclick="saveCurrentData()">保存</button>
        </div>
        <div class="model-list" id="modelListContainer"></div>
    </div>

    <div class="game-section">
        <div class="game-row">
            <div class="game-label">現在のゲーム数</div>
            <div class="game-input-wrap">
                <input type="number" id="inputCurrentGames" class="game-input" value="0" oninput="updateGames()">
                <button class="btn-add" onclick="addGames(100)">+100G</button>
                <button class="btn-add" onclick="addGames(1000)">+1000G</button>
            </div>
        </div>
        <div class="game-row">
            <div class="game-label">打ち始めゲーム数</div>
            <div class="game-input-wrap">
                <input type="number" id="inputStartGames" class="game-input" value="0" oninput="updateGames()">
                <button class="btn-add" onclick="confirmClearGames()" style="color:#ff4444;">リセット</button>
            </div>
        </div>
        <div class="actual-games-display">実戦回転数: <span id="displayActualGames">0</span> G</div>
    </div>

    <div class="counter-grid" id="counterGrid"></div>

    <div class="cz-section">
        <div style="color:#ffcc00; font-weight:bold; text-align:center;">🎯 チャンスゾーン（CZ）成功確率</div>
        <div class="cz-grid">
            <div class="cz-col"><div>CZ突入</div><div class="cz-count-box" id="czTotalNum">0</div><div style="display:flex;gap:4px;"><button class="btn-cz-ctrl" onclick="changeCZ('total', -1)">-</button><button class="btn-cz-ctrl" onclick="changeCZ('total', 1)">＋</button></div></div>
            <div class="cz-col"><div>CZ成功</div><div class="cz-count-box" id="czSuccessNum" style="color: #00ffcc;">0</div><div style="display:flex;gap:4px;"><button class="btn-cz-ctrl" onclick="changeCZ('success', -1)">-</button><button class="btn-cz-ctrl" onclick="changeCZ('success', 1)">＋</button></div></div>
        </div>
        <div class="cz-rate-banner" id="czRateDisplay">成功率: 0.0% (0 / 0)</div>
    </div>

    <div class="estimation-section">
        <div class="est-table-scroll"><table id="estimationTable"><thead id="tableHead"></thead><tbody id="tableBody"></tbody></table></div>
        <div class="graph-container" id="graphContainer"></div>
    </div>
</div>

<div class="modal" id="manualModal">
    <div class="modal-content">
        <div class="modal-title" style="color:#00ffcc; text-align:center;">使い方</div>
        <p style="font-size:0.9rem;">役の「-」「＋」でカウント、「リセ」でその役を0に、「消」で削除します。<br>保存機能で機種データを残せます。</p>
        <button class="btn-close" onclick="toggleModal(false)">閉じる</button>
    </div>
</div>

<script>
    let rolesData = [
        { name: "チェリー", count: 0, color: "bg-red", pDenominators: ["", "", "", "", "", ""] },
        { name: "スイカ", count: 0, color: "bg-green", pDenominators: ["", "", "", "", "", ""] },
        { name: "ベル", count: 0, color: "bg-yellow", pDenominators: ["", "", "", "", "", ""] },
        { name: "チャンス目", count: 0, color: "bg-purple", pDenominators: ["", "", "", "", "", ""] }
    ];
    let czData = { total: 0, success: 0 };
    const colorOptions = [{val:"bg-red",label:"赤"},{val:"bg-green",label:"緑"},{val:"bg-yellow",label:"黄"},{val:"bg-purple",label:"紫"},{val:"bg-blue",label:"青"}];

    window.onload = function() { renderAll(); loadSavedList(); };
    function renderAll() { renderCards(); renderTable(); updateGraph(); updateGames(); updateCZDisplay(); }

    function renderCards() {
        const grid = document.getElementById('counterGrid');
        grid.innerHTML = "";
        rolesData.forEach((role, idx) => {
            const card = document.createElement('div');
            card.className = `counter-card ${role.color}`;
            if(role.color === 'bg-yellow') card.classList.add('dark-text');
            card.innerHTML = `
                <div class="card-top">
                    <input type="text" class="role-name-input" value="${role.name}" onchange="rolesData[${idx}].name=this.value; renderTable()">
                    <select class="color-select" onchange="rolesData[${idx}].color=this.value; renderCards()">
                        ${colorOptions.map(o=>`<option value="${o.val}" ${role.color===o.val?'selected':''}>${o.label}</option>`).join('')}
                    </select>
                </div>
                <div class="count-num" id="count-val-${idx}">${role.count}</div>
                <div class="prob-display" id="prob-val-${idx}">1/0.0</div>
                <div class="card-bottom-btns">
                    <button class="btn-card-action" onclick="countAction(${idx}, -1)">-</button>
                    <button class="btn-card-action" onclick="countAction(${idx}, 1)">＋</button>
                    <button class="btn-card-reset" onclick="confirmResetRole(${idx})">リセ</button>
                    <button class="btn-card-action btn-delete" onclick="confirmDeleteRole(${idx})">消</button>
                </div>
            `;
            grid.appendChild(card);
        });
    }

    function confirmResetRole(idx) { if(confirm(`${rolesData[idx].name}のカウントをリセットする？`)) resetRole(idx); }
    function confirmDeleteRole(idx) { if(confirm(`${rolesData[idx].name}を削除していい？`)) deleteRole(idx); }
    function confirmClearGames() { if(confirm("ゲーム数をリセットする？")) clearGames(); }

    function resetRole(idx) { rolesData[idx].count = 0; renderCards(); calculateProbabilities(); }
    function deleteRole(idx) { rolesData.splice(idx, 1); renderAll(); }
    
    function renderTable() {
        const thead = document.getElementById('tableHead');
        const tbody = document.getElementById('tableBody');
        thead.innerHTML = `<tr><th>設定</th>` + rolesData.map(r => `<th>${r.name}</th>`).join('') + `</tr>`;
        tbody.innerHTML = "";
        for (let s = 0; s < 6; s++) {
            tbody.innerHTML += `<tr><td style="font-weight:bold;">${s+1}</td>` + rolesData.map((r, i) => `<td><input type="number" class="table-input" value="${r.pDenominators[s]||''}" oninput="rolesData[${i}].pDenominators[${s}]=this.value; calculateProbabilities()"></td>`).join('') + `</tr>`;
        }
    }

    function updateGraph() {
        const cont = document.getElementById('graphContainer');
        cont.innerHTML = "";
        for(let i=1; i<=6; i++) cont.innerHTML += `<div style="display:flex; align-items:center; margin-bottom:4px;"><div style="width:30px; font-weight:bold;">${i}</div><div class="graph-bar-wrap"><div class="graph-bar" id="bar-${i}"></div></div><div id="val-${i}" style="width:40px; font-weight:bold;">16.7%</div></div>`;
    }

    function countAction(idx, v) { rolesData[idx].count = Math.max(0, rolesData[idx].count + v); renderCards(); calculateProbabilities(); }
    function addNewRole() { rolesData.push({ name: "新役", count: 0, color: "bg-blue", pDenominators: ["", "", "", "", "", ""] }); renderAll(); }

    function calculateProbabilities() {
        const actualGames = parseInt(document.getElementById('displayActualGames').innerText, 10) || 0;
        rolesData.forEach((r, i) => document.getElementById(`prob-val-${i}`).innerText = (r.count > 0 && actualGames > 0) ? `1/${(actualGames/r.count).toFixed(1)}` : "1/0.0");
        let likelihoods = [1,1,1,1,1,1];
        if (actualGames > 0) {
            for(let s=0; s<6; s++) {
                let logL = 0;
                rolesData.forEach(r => { if(r.pDenominators[s]>0) { let p=1/r.pDenominators[s]; logL += r.count * Math.log(p) + (actualGames-r.count) * Math.log(1-p); }});
                likelihoods[s] = Math.exp(logL);
            }
        }
        let sum = likelihoods.reduce((a,b)=>a+b, 0);
        for(let i=1; i<=6; i++) {
            let p = (sum > 0) ? (likelihoods[i-1]/sum*100).toFixed(1) : "16.7";
            document.getElementById(`bar-${i}`).style.width = p + "%";
            document.getElementById(`val-${i}`).innerText = p + "%";
        }
    }

    function changeCZ(type, val) { czData[type] = Math.max(0, czData[type] + val); if (czData.success > czData.total) czData.total = czData.success; updateCZDisplay(); }
    function updateCZDisplay() { 
        document.getElementById('czTotalNum').innerText = czData.total; 
        document.getElementById('czSuccessNum').innerText = czData.success; 
        const p = czData.total > 0 ? (czData.success/czData.total*100).toFixed(1) : "0.0";
        document.getElementById('czRateDisplay').innerText = `成功率: ${p}% (${czData.success} / ${czData.total})`;
    }
    
    function updateGames() { const g = Math.max(0, (parseInt(document.getElementById('inputCurrentGames').value)||0) - (parseInt(document.getElementById('inputStartGames').value)||0)); document.getElementById('displayActualGames').innerText = g; calculateProbabilities(); }
    function addGames(v) { document.getElementById('inputCurrentGames').value = (parseInt(document.getElementById('inputCurrentGames').value)||0) + v; updateGames(); }
    function clearGames() { document.getElementById('inputCurrentGames').value = 0; document.getElementById('inputStartGames').value = 0; updateGames(); }
    function toggleModal(s) { document.getElementById('manualModal').style.display = s ? 'flex' : 'none'; }
    function fullResetAll() { if(confirm("全データをリセットしていい？")) { rolesData.forEach(r => r.count=0); czData={total:0, success:0}; document.getElementById('inputCurrentGames').value=0; document.getElementById('inputStartGames').value=0; renderAll(); } }
    function saveCurrentData() { const n = document.getElementById('modelNameInput').value; if(!n) return alert("機種名を入力"); localStorage.setItem("slot_"+n, JSON.stringify({rolesData, czData, c:document.getElementById('inputCurrentGames').value, s:document.getElementById('inputStartGames').value})); loadSavedList(); }
    function loadSavedList() { const c = document.getElementById('modelListContainer'); c.innerHTML = ""; for(let i=0; i<localStorage.length; i++) { const k = localStorage.key(i); if(k.startsWith("slot_")) c.innerHTML += `<div class="model-chip" onclick="loadData('${k}')">${k.replace("slot_","")}<button class="btn-delete-chip" onclick="localStorage.removeItem('${k}'); loadSavedList(); event.stopPropagation()">×</button></div>`; } }
    function loadData(k) { const d = JSON.parse(localStorage.getItem(k)); rolesData=d.rolesData; czData=d.czData; document.getElementById('inputCurrentGames').value=d.c; document.getElementById('inputStartGames').value=d.s; renderAll(); }
</script>
</body>
</html>
